---
- name: Set up chibi-miku
  hosts: all
  become: true

  vars:
    required_packages:
      - ansible
      - build-base
      - curl
      - dconf-editor
      - distrobox
      - git
      - gnome-tweaks
      - irqbalance
      - irqbalance-systemd
      - keyd
      - tailscale
      - tailscale-systemd

    laptop_files_dir: "{{ playbook_dir | dirname }}/files/chibi-miku"

    kernel_workaround_package: linux-postmarketos-qcom-sc7180
    kernel_workaround_version: 6.12.35-r11
    kernel_workaround_apk: >-
      {{ kernel_workaround_package }}-{{ kernel_workaround_version }}.apk
    kernel_workaround_url: >-
      http://mirror.postmarketos.org/postmarketos/v25.12/aarch64/{{ kernel_workaround_apk }}
    kernel_workaround_path: "/var/cache/apk/{{ kernel_workaround_apk }}"
    kernel_workaround_checksum: >-
      sha256:69151fb4be033a1bd104c720c03182235290134e6c754c2a5f9c5a28b15afe00

    enabled_services:
      - irqbalance.service
      - tailscaled.service

    masked_services:
      - cros-keyboard-map.service
      - iio-sensor-proxy.service

  roles:
    - role: nix

  pre_tasks:
    - name: Ensure required apk packages are installed
      community.general.apk:
        name: "{{ required_packages }}"
        state: present
        update_cache: true

  tasks:
    - name: Check installed postmarketOS kernel package
      ansible.builtin.command: apk list --installed "{{ kernel_workaround_package }}"
      register: installed_kernel_package
      changed_when: false

    - name: Download postmarketOS 25.12 kernel package
      ansible.builtin.get_url:
        url: "{{ kernel_workaround_url }}"
        dest: "{{ kernel_workaround_path }}"
        checksum: "{{ kernel_workaround_checksum }}"
        owner: root
        group: root
        mode: "0644"
      when: kernel_workaround_version not in installed_kernel_package.stdout

    # Temporary workaround for linux-postmarketos-qcom-sc7180 6.18 suspend
    # resuming after about 10 seconds on Google Wormdingler.
    # https://gitlab.postmarketos.org/postmarketOS/pmaports/-/work_items/4659
    - name: Install postmarketOS 25.12 kernel package
      ansible.builtin.command:
        argv:
          - apk
          - add
          - --allow-untrusted
          - "{{ kernel_workaround_path }}"
      when: kernel_workaround_version not in installed_kernel_package.stdout

    - name: Pin postmarketOS kernel package version
      ansible.builtin.lineinfile:
        path: /etc/apk/world
        regexp: "^{{ kernel_workaround_package | regex_escape }}([<>=~].*)?$"
        line: "{{ kernel_workaround_package }}={{ kernel_workaround_version }}"
        owner: root
        group: root
        mode: "0644"

    - name: Mask unwanted systemd services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
        masked: true
      loop: "{{ masked_services }}"

    - name: Enable services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ enabled_services }}"

    - name: Ensure keyd configuration directory exists
      ansible.builtin.file:
        path: /etc/keyd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install keyd default configuration
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/keyd-default.conf"
        dest: /etc/keyd/default.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart keyd

    - name: Remove generated ChromeOS keyd configuration
      ansible.builtin.file:
        path: /etc/keyd/cros.conf
        state: absent
      notify: Restart keyd

    - name: Ensure udev configuration directory exists
      ansible.builtin.file:
        path: /etc/udev/rules.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install udev rotation definition
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/61-cros-ec-accel.rules"
        dest: /etc/udev/rules.d/61-cros-ec-accel.rules
        owner: root
        group: root
        mode: "0644"

    - name: Ensure libwacom configuration directory exists
      ansible.builtin.file:
        path: /etc/libwacom
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Wormdingler libwacom tablet definition
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/google-wormdingler.tablet"
        dest: /etc/libwacom/google-wormdingler.tablet
        owner: root
        group: root
        mode: "0644"
      notify: Update libwacom db

    - name: Ensure resolved.conf.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install resolved's dnssec config
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/resolved-dnssec.conf"
        dest: /etc/systemd/resolved.conf.d/dnssec.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart systemd-resolved

    - name: Ensure logind.conf.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/logind.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure logind power key handling
      ansible.builtin.copy:
        dest: /etc/systemd/logind.conf.d/99-chibi-miku-power.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Login]
          HandlePowerKey=suspend
          HandleSuspendKey=suspend
          HandleHibernateKey=hibernate
          HandleLidSwitch=suspend
          HandleLidSwitchExternalPower=suspend
          HandleLidSwitchDocked=suspend
      notify: Restart systemd-logind

    - name: Ensure libinput quirks directory exists
      ansible.builtin.file:
        path: /etc/libinput
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install local libinput overrides
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/local-overrides.quirks"
        dest: /etc/libinput/local-overrides.quirks
        owner: root
        group: root
        mode: "0644"

    - name: Install touchscreen-reset sleep hack
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/touchscreen-reset.sh"
        dest: /lib/systemd/system-sleep/touchscreen-reset.sh
        owner: root
        group: root
        mode: "0755"

  handlers:
    - name: Restart keyd
      ansible.builtin.systemd_service:
        name: "keyd"
        state: restarted

    - name: Restart systemd-resolved
      ansible.builtin.systemd_service:
        name: "systemd-resolved"
        state: restarted

    - name: Restart systemd-logind
      ansible.builtin.systemd_service:
        name: "systemd-logind"
        state: restarted

    - name: Update libwacom db
      ansible.builtin.command: libwacom-update-db
      changed_when: true
