---
- name: Set up chibi-miku
  hosts: all
  become: true

  vars:
    required_packages:
      - build-base
      - curl
      - dconf-editor
      - distrobox
      - git
      - gnome-tweaks
      - sudo
      - tailscale
      - tailscale-systemd

    laptop_files_dir: "{{ playbook_dir | dirname }}/files"

    masked_services:
      - cros-keyboard-map.service
      - iio-sensor-proxy.service

    absent_packages:
      - doas
      - doas-sudo-shim

  roles:
    - role: nix

  pre_tasks:
    - name: Ensure conflicting packages are absent
      community.general.apk:
        name: "{{ absent_packages }}"
        state: absent

    - name: Ensure required apk packages are installed
      community.general.apk:
        name: "{{ required_packages }}"
        state: present
        update_cache: true

  tasks:
    - name: Mask unwanted systemd services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: true
      loop: "{{ masked_services }}"

    - name: Stop unwanted systemd services if they are loaded
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ masked_services }}"
      failed_when: false

    - name: Ensure keyd configuration directory exists
      ansible.builtin.file:
        path: /etc/keyd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install keyd default configuration
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/keyd-default.conf"
        dest: /etc/keyd/default.conf
        owner: root
        group: root
        mode: "0644"

    - name: Ensure libwacom configuration directory exists
      ansible.builtin.file:
        path: /etc/libwacom
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Wormdingler libwacom tablet definition
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/google-wormdingler.tablet"
        dest: /etc/libwacom/google-wormdingler.tablet
        owner: root
        group: root
        mode: "0644"
      notify: Update libwacom db

    - name: Ensure libinput quirks directory exists
      ansible.builtin.file:
        path: /etc/libinput
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install local libinput overrides
      ansible.builtin.copy:
        src: "{{ laptop_files_dir }}/local-overrides.quirks"
        dest: /etc/libinput/local-overrides.quirks
        owner: root
        group: root
        mode: "0644"

  handlers:
    - name: Update libwacom db
      ansible.builtin.command: libwacom-update-db
      changed_when: true
